<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Interaction State Fixture -- Good</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: sans-serif; margin: 0; padding: 32px; background: #ffffff; color: #1a1a1a; }

  .btn {
    display: inline-block;
    background: #0055ff;
    color: #ffffff;
    padding: 10px 18px;
    border: 2px solid transparent;
    font-size: 16px;
    margin-bottom: 16px;
  }
  /* Real, visible focus indicator. */
  .btn:focus-visible {
    outline: 3px solid #003399;
    outline-offset: 2px;
  }
  /* Hover darkens the background but keeps white text well above 4.5:1. */
  .btn:hover {
    background: #003399;
  }
  /* Active state stays high-contrast too. */
  .btn:active {
    background: #002266;
  }
</style>
</head>
<body>
  <h1>Interaction States Fixture -- Good</h1>
  <p>One button, properly handled focus/hover/active states throughout.</p>
  <button class="btn">Well-behaved button</button>
</body>
</html>
