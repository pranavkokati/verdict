<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Site Fixture -- Contact</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: sans-serif; margin: 0; background: #ffffff; color: #1a1a1a; }
  h1 { font-size: 32px; font-weight: 700; color: #111111; margin: 0 0 16px 0; }
  p { font-size: 16px; color: #333333; margin: 0 0 16px 0; }
  header { padding: 24px 32px; }
  main { padding: 32px; }
  .btn-primary {
    display: inline-block;
    background: #0055ff;
    color: #ffffff;
    font-size: 16px;
    padding: 8px 16px;
    margin-top: 8px;
    text-decoration: none;
    border-radius: 4px;
  }
</style>
</head>
<body>
  <header role="banner">
    <h1>Contact Acme</h1>
  </header>
  <main>
    <p>Consistent body copy that reads the same way on every page of the site.</p>
    <a class="btn-primary" href="#">Send message</a>
  </main>
</body>
</html>
