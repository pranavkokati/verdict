<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Bad Fixture, Fixed</title>
<style>
  /* Same layout as bad.html, but with contrast, type-scale, spacing, and
     heading/landmark/alt issues corrected -- this is the "after" an AI
     agent should produce once it's acting on a Verdict fix-list. */
  body { font-family: sans-serif; margin: 0; background: #ffffff; }
  .hero { background: #f2f2f2; padding: 16px 24px; }
  .hero h1 { font-size: 32px; color: #1a1a1a; margin: 0; }
  .hero p { font-size: 16px; color: #333333; margin-top: 8px; }
  .card { margin: 8px; padding: 8px 16px; font-size: 18px; color: #1a1a1a; background: #ffffff; }
  .card h2 { font-size: 24px; color: #1a1a1a; margin: 0 0 8px 0; }
  .footer h3 { font-size: 18px; color: #1a1a1a; }
  img { width: 40px; height: 40px; }
</style>
</head>
<body>
  <div class="hero">
    <h1>Welcome</h1>
    <p>This is some body copy that is now easy to read against its background.</p>
  </div>
  <main class="card">
    <h2>Card content</h2>
    <p>Card content with a font size that lands on the scale.</p>
  </main>
  <div class="footer">
    <h3>Footer heading</h3>
    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBTAA7" alt="decorative divider" />
  </div>
</body>
</html>
