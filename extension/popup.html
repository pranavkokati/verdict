<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --ink: #0f1115; --ink-3: #6b7280; --line: #e5e7eb; --bg-soft: #fafafa;
    --good: #16a34a; --bad: #dc2626;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; width: 360px; font-family: var(--sans); color: var(--ink); background: #fff; }
  header { display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
  header .mark { width: 18px; height: 18px; flex-shrink: 0; }
  header .mark path { fill: var(--ink); }
  header h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  header .thr { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-3); display: flex; align-items: center; gap: 4px; }
  header .thr input { width: 34px; font-family: var(--mono); font-size: 11px; border: 1px solid var(--line); border-radius: 5px; padding: 2px 4px; }

  .runbar { padding: 12px 16px; }
  button.run {
    width: 100%; background: #0b0c0f; color: white; border: none; border-radius: 8px;
    padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sans);
  }
  button.run:hover { opacity: 0.9; }
  button.run:disabled { opacity: 0.5; cursor: default; }

  #result { padding: 0 16px 16px; display: none; }
  .scorerow { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .score { font-size: 26px; font-weight: 700; font-family: var(--mono); }
  .badge { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; padding: 2px 9px; border-radius: 999px; }
  .badge.pass { background: rgba(22,163,74,0.12); color: #15803d; }
  .badge.fail { background: rgba(220,38,38,0.12); color: #b91c1c; }
  .url { font-size: 11px; color: var(--ink-3); font-family: var(--mono); margin: 0 0 12px; word-break: break-all; }

  .checkrow { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--line); font-size: 12.5px; }
  .checkrow .left { display: flex; align-items: center; gap: 8px; }
  .checkrow .mk { width: 14px; height: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
  .checkrow .mk.ok { background: rgba(22,163,74,0.14); color: #15803d; }
  .checkrow .mk.no { background: rgba(220,38,38,0.14); color: #b91c1c; }
  .checkrow .cnt { color: var(--ink-3); font-size: 11.5px; }

  .issues { margin-top: 10px; max-height: 220px; overflow-y: auto; border-top: 1px solid var(--line); }
  .issue { padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 11.5px; }
  .issue .msg { color: var(--ink); line-height: 1.5; }
  .issue .sel { font-family: var(--mono); color: var(--ink-3); font-size: 10.5px; margin-top: 3px; word-break: break-all; }
  .issue .sev { display: inline-block; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-right: 6px; padding: 1px 5px; border-radius: 4px; }
  .issue .sev.error { background: rgba(220,38,38,0.12); color: #b91c1c; }
  .issue .sev.warning { background: rgba(217,119,6,0.12); color: #b45309; }
  .issue .sev.info { background: var(--bg-soft); color: var(--ink-3); }

  .actions { display: flex; gap: 8px; margin-top: 12px; }
  .actions button { flex: 1; font-family: var(--sans); font-size: 11.5px; font-weight: 600; padding: 7px; border-radius: 7px; border: 1px solid var(--line); background: #fff; cursor: pointer; }
  .actions button:hover { background: var(--bg-soft); }

  .empty { padding: 24px 16px; text-align: center; color: var(--ink-3); font-size: 12.5px; }
  .err { padding: 12px 16px; color: #b91c1c; font-size: 12px; background: rgba(220,38,38,0.06); border-radius: 8px; margin: 0 16px 12px; }
</style>
</head>
<body>
<header>
  <svg class="mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <g>
      <path d="M50 50 C46 34 41 20 50 6 C59 20 54 34 50 50 Z" transform="rotate(0 50 50)"/>
      <path d="M50 50 C46 34 41 20 50 6 C59 20 54 34 50 50 Z" transform="rotate(45 50 50)"/>
      <path d="M50 50 C46 34 41 20 50 6 C59 20 54 34 50 50 Z" transform="rotate(90 50 50)"/>
      <path d="M50 50 C46 34 41 20 50 6 C59 20 54 34 50 50 Z" transform="rotate(135 50 50)"/>
      <path d="M50 50 C46 34 41 20 50 6 C59 20 54 34 50 50 Z" transform="rotate(180 50 50)"/>
      <path d="M50 50 C46 34 41 20 50 6 C59 20 54 34 50 50 Z" transform="rotate(225 50 50)"/>
      <path d="M50 50 C46 34 41 20 50 6 C59 20 54 34 50 50 Z" transform="rotate(270 50 50)"/>
      <path d="M50 50 C46 34 41 20 50 6 C59 20 54 34 50 50 Z" transform="rotate(315 50 50)"/>
    </g>
  </svg>
  <h1>Verdict</h1>
  <span class="thr">threshold <input id="threshold" type="number" value="80" min="0" max="100" /></span>
</header>

<div class="runbar"><button class="run" id="runBtn">Check this page</button></div>
<div id="empty" class="empty">Runs the same contrast, type-scale, spacing, and heading checks as the CLI, directly against this tab's live DOM.</div>
<div id="errbox"></div>
<div id="result"></div>

<script src="popup.js"></script>
</body>
</html>
